name: Motociklo sekimas

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
      - name: Atsisiusti koda
        uses: actions/checkout@v4

      - name: Paruosti Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Idiegti bibliotekas
        run: pip install requests beautifulsoup4

      - name: Patikrinti puslapi ir rasti konteineri
        id: tracker
        shell: python
        run: |
          import requests
          from bs4 import BeautifulSoup
          import os

          URL = "https://shipbaltic.com"
          headers = {'User-Agent': 'Mozilla/5.0'}
          
          try:
              response = requests.get(URL, headers=headers, timeout=15)
              soup = BeautifulSoup(response.text, 'html.parser')
              rows = soup.find_all('tr')
              
              container_found = "false"
              container_val = "-"
              
              for row in rows:
                  cells = row.find_all(['td', 'th'])
                  if len(cells) >= 2:
                      title = cells.text.strip()
                      value = cells.text.strip()
                      if "Container number" in title and value and value != "-":
                          container_found = "true"
                          container_val = value
                          break
                          
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f"found={container_found}\n")
                  f.write(f"val={container_val}\n")
                  
          except Exception as e:
              print(f"Klaida: {e}")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write("found=false\n")

      - name: G-TESTAS (Zinute i viesu kanala)
        run: |
          curl -s -X POST "https://telegram.org" \
          -d "chat_id=@manomotociklas" \
          -d "text=🧪 G-TESTAS: Sekimas sėkmingai paleistas viešame kanale!"

      - name: Siusti pranesima i kanala jei atsirado konteineris
        if: steps.tracker.outputs.found == 'true'
        run: |
          curl -s -X POST "https://telegram.org" \
          -d "chat_id=@manomotociklas" \
          -d "text=🔔 ATRADOME KONTEINERIO NR! Numeris: ${{ steps.tracker.outputs.val }}. Nuoroda: https://shipbaltic.com"
